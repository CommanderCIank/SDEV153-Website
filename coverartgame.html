<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Art Game Trivia</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>What video game is this cover art for?</h1>

    <h2>Game Options</h2>
    <ul>
        <li>Halo</li>
        <li>Mario</li>
        <li>Doom</li>
        <li>Tetris</li>
    </ul>

    <h2>Score Breakdown</h2>
    <table border="1">
        <tr>
            <th>Question</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Score</td>
            <td id="tableScore">0</td>
        </tr>
    </table>

    <img id="coverImage" src="" alt="Random video game cover art for trivia question" width="300">

    <form id="quizForm">
        <p>Select your answer:</p>

        <label>
            <input type="radio" name="game" value="Halo"> Halo
        </label><br>

        <label>
            <input type="radio" name="game" value="Mario"> Mario
        </label><br>

        <label>
            <input type="radio" name="game" value="Doom"> Doom
        </label><br>

        <label>
            <input type="radio" name="game" value="Tetris"> Tetris
        </label><br><br>

        <button type="submit">Confirm Answer</button>
    </form>

    <p id="result"></p>

    <button id="nextBtn" style="display: none;">Next Question</button>
    <button id="resultsBtn" style="display: none;">View Results</button>

    <br><br>
    <a href="index.html" class="button-link">Return to Homepage</a>

<script>
    const params = new URLSearchParams(window.location.search);
    const playerName = params.get("name");

    let questionCount = 0;
    const maxQuestions = 4;

    const questions = [
        { src: "images/halo.png", answer: "Halo", alt: "Halo Combat Evolved cover art" },
        { src: "images/mario.png", answer: "Mario", alt: "Super Mario Brothers cover art" },
        { src: "images/doom.png", answer: "Doom", alt: "Doom 1995 cover art" },
        { src: "images/tetris.png", answer: "Tetris", alt: "Tetris 1984 cover art" }
    ];

    let remainingQuestions = [...questions];
    let currentQuestion;
    let score = 0;

    function loadQuestion() {

        if (questionCount >= maxQuestions) {
            return;
        }

        if (remainingQuestions.length === 0) {
            remainingQuestions = [...questions];
        }

        const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
        currentQuestion = remainingQuestions[randomIndex];

        remainingQuestions.splice(randomIndex, 1);

        document.getElementById("coverImage").src = currentQuestion.src;

        document.getElementById("quizForm").reset();
        document.getElementById("result").textContent = "";
        document.getElementById("nextBtn").style.display = "none";

        const radios = document.querySelectorAll('input[name="game"]');
        radios.forEach(radio => radio.disabled = false);

        document.querySelector('#quizForm button').disabled = false;
    }

    loadQuestion();

    document.getElementById("quizForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const selected = document.querySelector('input[name="game"]:checked');

        if (!selected) {
            document.getElementById("result").textContent = "Please select an answer!";
            return;
        }

        if (selected.value === currentQuestion.answer) {
            document.getElementById("result").textContent = "Correct!";
            score++;
            document.getElementById("tableScore").textContent = score;
        } else {
            document.getElementById("result").textContent =
                "Incorrect! The correct answer was " + currentQuestion.answer + ".";
        }

        questionCount++;

        if (questionCount < maxQuestions) {
            document.getElementById("nextBtn").style.display = "inline-block";
        } else {
            document.getElementById("nextBtn").style.display = "none";
            document.getElementById("resultsBtn").style.display = "inline-block";
        }

        const radios = document.querySelectorAll('input[name="game"]');
        radios.forEach(radio => radio.disabled = true);

        document.querySelector('#quizForm button').disabled = true;
    });

    document.getElementById("nextBtn").addEventListener("click", function() {
        loadQuestion();
    });

    document.getElementById("resultsBtn").addEventListener("click", function() {
        window.location.href = "results.html?score=" + score + "&name=" + encodeURIComponent(playerName);
    });
</script>

</body>
</html>
