<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game Trivia Game Selection</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Select Game Type</h1>

    <h2>Cover Art Game</h2>
    <a id="coverGameLink" href="#">
        <button type="button">Start Cover Art Game</button>
    </a>

    <h2>Audio Clip Game</h2>
    <a id="audioGameLink" href="#">
        <button type="button">Start Audio Clip Game</button>
    </a>

<script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Player";

    document.getElementById("coverGameLink").href =
        "coverartgame.html?name=" + encodeURIComponent(name);

    document.getElementById("audioGameLink").href =
        "audioclipgame.html?name=" + encodeURIComponent(name);
</script>

</body>
</html>
