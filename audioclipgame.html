<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Clip Game Trivia</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>What video game is this audio clip from?</h1>

    <div class="container">

        <div class="left-panel">
            <table>
                <tr>
                    <td>Score</td>
                    <td id="tableScore">0</td>
                </tr>
            </table>
        </div>

        <div class="right-panel">

            <audio id="audioPlayer" controls>
                <source id="audioSource" src="" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <form id="quizForm">
                <p>Select your answer:</p>

                <label>
                    <input type="radio" name="game" value="Halo"> Halo
                </label>

                <label>
                    <input type="radio" name="game" value="Mario"> Mario
                </label>

                <label>
                    <input type="radio" name="game" value="Doom"> Doom
                </label>

                <label>
                    <input type="radio" name="game" value="Tetris"> Tetris
                </label>

                <br><br>

                <button type="submit">Confirm Answer</button>
            </form>

            <p id="result"></p>

            <button id="nextBtn" style="display: none;">Next Question</button>
            <button id="resultsBtn" style="display: none;">View Results</button>

        </div>

    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const playerName = params.get("name") || "Player";

    let questionCount = 0;
    const maxQuestions = 4;

    const questions = [
        { src: "audio/halo.mp3", answer: "Halo" },
        { src: "audio/mario.mp3", answer: "Mario" },
        { src: "audio/doom.mp3", answer: "Doom" },
        { src: "audio/tetris.mp3", answer: "Tetris" }
    ];

    let remainingQuestions = [...questions];
    let currentQuestion;
    let score = 0;

    function loadQuestion() {

        if (questionCount >= maxQuestions) return;

        if (remainingQuestions.length === 0) {
            remainingQuestions = [...questions];
        }

        const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
        currentQuestion = remainingQuestions[randomIndex];

        remainingQuestions.splice(randomIndex, 1);

        const audioSource = document.getElementById("audioSource");
        const audioPlayer = document.getElementById("audioPlayer");

        audioSource.src = currentQuestion.src;
        audioPlayer.load();

        document.getElementById("quizForm").reset();
        document.getElementById("result").textContent = "";
        document.getElementById("nextBtn").style.display = "none";

        document.querySelectorAll('input[name="game"]').forEach(r => r.disabled = false);
        document.querySelector('#quizForm button').disabled = false;
    }

    loadQuestion();

    document.getElementById("quizForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const selected = document.querySelector('input[name="game"]:checked');

        if (!selected) {
            document.getElementById("result").textContent = "Please select an answer!";
            return;
        }

        if (selected.value === currentQuestion.answer) {
            document.getElementById("result").textContent = "Correct!";
            score++;
            document.getElementById("tableScore").textContent = score;
        } else {
            document.getElementById("result").textContent =
                "Incorrect! The correct answer was " + currentQuestion.answer + ".";
        }

        questionCount++;

        if (questionCount < maxQuestions) {
            document.getElementById("nextBtn").style.display = "inline-block";
        } else {
            document.getElementById("resultsBtn").style.display = "inline-block";
        }

        document.querySelectorAll('input[name="game"]').forEach(r => r.disabled = true);
        document.querySelector('#quizForm button').disabled = true;
    });

    document.getElementById("nextBtn").addEventListener("click", loadQuestion);

    document.getElementById("resultsBtn").addEventListener("click", function() {
        window.location.href = "results.html?score=" + score + "&name=" + encodeURIComponent(playerName);
    });
</script>

</body>

</html>
